<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imbir Thai Spa — Электронные подарочные сертификаты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --emerald:#0e3b2e; --emerald-2:#14523f; --emerald-3:#1d6b52;
  --gold:#c9a25c; --gold-2:#e6cf9a; --cream:#f7f2e9; --cream-2:#fdfbf6;
  --ink:#1d2521; --muted:#6d7a72; --line:#e6e0d2;
  --r:18px; --shadow:0 10px 40px rgba(14,59,46,.10);
  --font-d:'Prata',serif; --font-b:'Manrope',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,.display{font-family:var(--font-d);font-weight:400;line-height:1.2}
img{max-width:100%}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.hidden{display:none!important}

/* ---------- NAV ---------- */
nav{position:sticky;top:0;z-index:50;background:rgba(247,242,233,.86);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;gap:26px;height:66px}
.logo{font-family:var(--font-d);font-size:21px;color:var(--emerald);letter-spacing:.5px;cursor:pointer;white-space:nowrap}
.logo em{font-style:normal;color:var(--gold)}
.nav-links{display:flex;gap:4px;margin-left:auto}
.nav-links button{background:none;border:none;font-size:14.5px;font-weight:600;color:var(--ink);padding:9px 14px;border-radius:99px;transition:.2s}
.nav-links button:hover{background:rgba(14,59,46,.07)}
.nav-links button.active{background:var(--emerald);color:#fff}
.lang{display:flex;gap:2px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:3px}
.lang button{border:none;background:none;font-size:12.5px;font-weight:700;padding:5px 10px;border-radius:99px;color:var(--muted)}
.lang button.active{background:var(--gold);color:#fff}
.burger{display:none;background:none;border:none;font-size:26px;color:var(--emerald);margin-left:auto}

/* ---------- HERO ---------- */
.hero{position:relative;overflow:hidden;background:
  radial-gradient(1100px 500px at 85% -10%, rgba(201,162,92,.25), transparent 60%),
  radial-gradient(900px 600px at -10% 110%, rgba(29,107,82,.28), transparent 55%),
  linear-gradient(160deg,var(--emerald) 0%, var(--emerald-2) 60%, #0c3428 100%);
  color:#fff}
.hero-in{display:grid;grid-template-columns:1.1fr .9fr;gap:50px;align-items:center;padding:78px 0 86px}
.hero .eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-2);margin-bottom:20px}
.hero .eyebrow::before{content:"";width:34px;height:1px;background:var(--gold)}
.hero h1{font-size:clamp(34px,4.6vw,56px);margin-bottom:22px}
.hero h1 em{font-style:italic;color:var(--gold-2)}
.hero p{font-size:17px;color:rgba(255,255,255,.82);max-width:520px;margin-bottom:34px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:none;border-radius:99px;padding:15px 30px;font-size:15.5px;font-weight:700;transition:.25s}
.btn-gold{background:linear-gradient(120deg,var(--gold),#b8904a);color:#fff;box-shadow:0 8px 26px rgba(201,162,92,.4)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(201,162,92,.55)}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-ghost:hover{background:rgba(255,255,255,.2)}
.btn-green{background:var(--emerald);color:#fff}
.btn-green:hover{background:var(--emerald-3)}
.btn-outline{background:#fff;color:var(--emerald);border:1.5px solid var(--emerald)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.hero-stats{display:flex;gap:38px;margin-top:44px;flex-wrap:wrap}
.hero-stats b{display:block;font-family:var(--font-d);font-size:27px;color:var(--gold-2)}
.hero-stats span{font-size:13px;color:rgba(255,255,255,.65)}

/* floating cert in hero */
.hero-card{position:relative;transform:rotate(-3deg)}
.cert-float{animation:floaty 5s ease-in-out infinite}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ---------- CERT CARD (shared preview) ---------- */
.cert{aspect-ratio:16/9.6;border-radius:20px;padding:26px 30px;position:relative;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.35);display:flex;flex-direction:column;justify-content:space-between;color:#fff}
.cert::after{content:"";position:absolute;inset:10px;border:1px solid rgba(255,255,255,.35);border-radius:14px;pointer-events:none}
.cert .c-orn{position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.16),transparent 70%)}
.cert .c-brand{font-family:var(--font-d);font-size:16px;letter-spacing:1.5px}
.cert .c-brand small{display:block;font-family:var(--font-b);font-size:9.5px;letter-spacing:3.5px;text-transform:uppercase;opacity:.75;margin-top:2px}
.cert .c-title{font-family:var(--font-d);font-size:clamp(17px,2.2vw,24px);line-height:1.25}
.cert .c-sub{font-size:12px;opacity:.8;margin-top:4px}
.cert .c-foot{display:flex;justify-content:space-between;align-items:flex-end;font-size:11px;opacity:.9}
.cert .c-code{font-weight:700;letter-spacing:1.5px}
.theme-emerald{background:linear-gradient(135deg,#0e3b2e,#1d6b52 55%,#0e3b2e);}
.theme-emerald .c-title,.theme-emerald .c-brand{color:#f0e3c0}
.theme-gold{background:linear-gradient(135deg,#b8904a,#e6cf9a 50%,#c9a25c);color:#4a3512}
.theme-gold::after{border-color:rgba(74,53,18,.35)}
.theme-orchid{background:linear-gradient(135deg,#4a1d3f,#8e3a6d 55%,#5c2450)}
.theme-orchid .c-title,.theme-orchid .c-brand{color:#f3d9e8}
.theme-night{background:linear-gradient(135deg,#101820,#24384a 55%,#131c26)}
.theme-night .c-title,.theme-night .c-brand{color:#d9c491}

/* ---------- SECTIONS ---------- */
section{padding:74px 0}
.sec-head{text-align:center;max-width:640px;margin:0 auto 46px}
.sec-head .eyebrow{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:block}
.sec-head h2{font-size:clamp(27px,3.4vw,38px);color:var(--emerald)}
.sec-head p{color:var(--muted);margin-top:12px;font-size:15.5px}

/* steps how it works */
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.step{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:28px 24px;text-align:center;transition:.25s}
.step:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.step .ico{width:54px;height:54px;margin:0 auto 16px;border-radius:16px;background:linear-gradient(135deg,var(--emerald),var(--emerald-3));display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff}
.step b{display:block;font-size:15.5px;margin-bottom:6px}
.step span{font-size:13.5px;color:var(--muted)}

/* nominal cards */
.nominals{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.nom{background:#fff;border:1.5px solid var(--line);border-radius:var(--r);padding:26px 22px;text-align:center;cursor:pointer;transition:.22s;position:relative}
.nom:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:var(--shadow)}
.nom .amt{font-family:var(--font-d);font-size:26px;color:var(--emerald)}
.nom .lbl{font-size:12.5px;color:var(--muted);margin-top:5px}
.nom .tag{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--gold);color:#fff;font-size:10.5px;font-weight:800;letter-spacing:1px;padding:4px 12px;border-radius:99px;text-transform:uppercase;white-space:nowrap}

/* ---------- CATALOG ---------- */
.filters{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:99px;padding:9px 18px;font-size:13.5px;font-weight:600;color:var(--ink);transition:.2s}
.chip:hover{border-color:var(--gold)}
.chip.active{background:var(--emerald);border-color:var(--emerald);color:#fff}
.sort-row{display:flex;justify-content:center;gap:12px;margin-bottom:34px;flex-wrap:wrap}
.sort-row select{border:1.5px solid var(--line);border-radius:99px;padding:9px 16px;background:#fff;font-size:13.5px;font-weight:600;color:var(--ink);outline:none}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;transition:.25s}
.pcard:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
.pcard .ph{height:130px;position:relative;display:flex;align-items:flex-end;padding:16px}
.pcard .ph .cat{background:rgba(255,255,255,.92);color:var(--emerald);font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:99px}
.pcard .body{padding:20px 22px 22px;display:flex;flex-direction:column;flex:1}
.pcard h3{font-size:19px;color:var(--emerald);margin-bottom:4px}
.pcard .desc{font-size:13.5px;color:var(--muted);margin-bottom:14px;flex:1}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.opt{display:flex;justify-content:space-between;align-items:center;border:1.5px solid var(--line);border-radius:12px;padding:9px 14px;font-size:13.5px;cursor:pointer;transition:.15s}
.opt:hover{border-color:var(--gold)}
.opt.sel{border-color:var(--emerald);background:rgba(14,59,46,.05)}
.opt b{color:var(--emerald)}
.pcard .btn{width:100%;padding:12px}
.g1{background:linear-gradient(135deg,#14523f,#2b7a5f)}
.g2{background:linear-gradient(135deg,#8a5a2b,#c9a25c)}
.g3{background:linear-gradient(135deg,#4a1d3f,#8e3a6d)}
.g4{background:linear-gradient(135deg,#1b3a4a,#3b6f88)}
.g5{background:linear-gradient(135deg,#5d4210,#a3852f)}
.g6{background:linear-gradient(135deg,#28352f,#4d6457)}

/* ---------- BUILDER ---------- */
.builder{display:grid;grid-template-columns:1fr 420px;gap:38px;align-items:start}
.b-steps{display:flex;gap:6px;margin-bottom:30px;flex-wrap:wrap}
.b-step{flex:1;min-width:90px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);padding:10px 6px;border-bottom:3px solid var(--line);transition:.25s;white-space:nowrap}
.b-step.active{color:var(--emerald);border-color:var(--gold)}
.b-step.done{color:var(--emerald-3);border-color:var(--emerald-3)}
.panel{background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:30px;box-shadow:var(--shadow)}
.panel h3{font-size:22px;color:var(--emerald);margin-bottom:6px}
.panel .hint{font-size:13.5px;color:var(--muted);margin-bottom:22px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;outline:none;transition:.2s;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field textarea{resize:vertical;min-height:84px}
.field .cnt{font-size:11.5px;color:var(--muted);text-align:right;margin-top:4px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.seg{display:flex;gap:10px;flex-wrap:wrap}
.seg button{flex:1;min-width:120px;border:1.5px solid var(--line);background:#fff;border-radius:14px;padding:14px;font-size:14px;font-weight:700;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.seg button small{font-weight:500;font-size:12px;color:var(--muted)}
.seg button.active{border-color:var(--emerald);background:rgba(14,59,46,.06);color:var(--emerald)}
.themes{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.theme-pick{border:2.5px solid transparent;border-radius:14px;padding:3px;cursor:pointer;transition:.2s}
.theme-pick.active{border-color:var(--gold)}
.theme-pick .swatch{height:64px;border-radius:10px}
.theme-pick span{display:block;text-align:center;font-size:11.5px;font-weight:700;margin-top:5px;color:var(--muted)}
.amount-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.amount-grid button{border:1.5px solid var(--line);background:#fff;border-radius:12px;padding:13px;font-weight:700;font-size:15px;transition:.2s}
.amount-grid button.active{border-color:var(--emerald);background:rgba(14,59,46,.06);color:var(--emerald)}
.b-nav{display:flex;justify-content:space-between;margin-top:26px;gap:12px}
.preview-sticky{position:sticky;top:90px}
.preview-note{text-align:center;font-size:12.5px;color:var(--muted);margin-top:14px}
.summary{background:var(--cream-2);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-top:18px}
.summary .srow{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.summary .srow.total{border-top:1px solid var(--line);margin-top:8px;padding-top:12px;font-weight:800;font-size:15.5px;color:var(--emerald)}

/* payment */
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
.pay-methods button{border:2px solid var(--line);background:#fff;border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px;font-weight:800;font-size:15px;transition:.2s}
.pay-methods button.active{border-color:var(--emerald);background:rgba(14,59,46,.05)}
.kaspi-badge{background:#f14635;color:#fff;font-size:13px;font-weight:800;padding:6px 16px;border-radius:8px;letter-spacing:.5px}
.card-badge{display:flex;gap:6px;font-size:12px;font-weight:800}
.card-badge i{font-style:normal;background:var(--cream);border:1px solid var(--line);padding:5px 10px;border-radius:8px}

/* success */
.success{text-align:center;max-width:640px;margin:0 auto}
.success .check{width:84px;height:84px;margin:0 auto 24px;border-radius:50%;background:linear-gradient(135deg,var(--emerald),var(--emerald-3));color:#fff;font-size:38px;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 40px rgba(14,59,46,.35);animation:pop .5s cubic-bezier(.6,1.6,.4,1)}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
.success h2{font-size:32px;color:var(--emerald);margin-bottom:10px}
.success p{color:var(--muted);margin-bottom:26px}
.success .cert{max-width:520px;margin:0 auto 26px}
.code-pill{display:inline-flex;align-items:center;gap:10px;background:#fff;border:1.5px dashed var(--gold);border-radius:12px;padding:12px 22px;font-weight:800;font-size:17px;letter-spacing:2px;color:var(--emerald);margin-bottom:26px}
.code-pill button{border:none;background:var(--cream);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700}

/* check page */
.check-box{max-width:520px;margin:0 auto;background:#fff;border:1px solid var(--line);border-radius:var(--r);padding:36px;box-shadow:var(--shadow)}
.check-result{margin-top:22px;border-radius:14px;padding:20px;font-size:14.5px}
.check-result.ok{background:rgba(29,107,82,.09);border:1px solid rgba(29,107,82,.3)}
.check-result.bad{background:rgba(200,60,50,.07);border:1px solid rgba(200,60,50,.25);color:#8c2f27}
.check-result .srow{display:flex;justify-content:space-between;padding:4px 0}

/* faq */
.faq{max-width:760px;margin:0 auto}
.faq details{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.faq summary{padding:18px 22px;font-weight:700;font-size:15px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center}
.faq summary::after{content:"+";font-size:22px;color:var(--gold);transition:.25s}
.faq details[open] summary::after{transform:rotate(45deg)}
.faq .fa-body{padding:0 22px 18px;font-size:14px;color:var(--muted)}

/* footer */
footer{background:var(--emerald);color:rgba(255,255,255,.8);padding:54px 0 34px;margin-top:20px}
.f-grid{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;gap:34px;margin-bottom:36px}
footer h4{color:#fff;font-family:var(--font-d);font-size:17px;margin-bottom:14px}
footer li{list-style:none;font-size:13.5px;margin-bottom:8px}
footer a{text-decoration:none;transition:.2s}
footer a:hover{color:var(--gold-2)}
.f-bottom{border-top:1px solid rgba(255,255,255,.15);padding-top:22px;font-size:12.5px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;color:rgba(255,255,255,.5)}
.wa-fab{position:fixed;right:22px;bottom:22px;z-index:60;width:56px;height:56px;border-radius:50%;background:#25d366;color:#fff;display:flex;align-items:center;justify-content:center;font-size:27px;text-decoration:none;box-shadow:0 10px 30px rgba(37,211,102,.45);transition:.25s}
.wa-fab:hover{transform:scale(1.08)}

/* toast */
.toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(80px);background:var(--emerald);color:#fff;padding:13px 26px;border-radius:99px;font-size:14px;font-weight:600;z-index:99;opacity:0;transition:.35s;box-shadow:0 12px 34px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* responsive */
@media(max-width:980px){
  .hero-in{grid-template-columns:1fr;padding:52px 0 60px}
  .hero-card{max-width:480px;margin:0 auto}
  .steps,.nominals{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:repeat(2,1fr)}
  .builder{grid-template-columns:1fr}
  .preview-sticky{position:static;max-width:520px;margin:0 auto}
  .f-grid{grid-template-columns:1fr 1fr}
  .nav-links{display:none;position:absolute;top:66px;left:0;right:0;background:var(--cream-2);flex-direction:column;padding:14px;border-bottom:1px solid var(--line)}
  .nav-links.open{display:flex}
  .burger{display:block}
}
@media(max-width:600px){
  .grid,.steps,.nominals,.themes,.pay-methods,.row2,.amount-grid{grid-template-columns:1fr}
  .themes{grid-template-columns:repeat(2,1fr)}
  section{padding:52px 0}
  .panel{padding:22px}
}
/* ================= V2 · WOW-ЭФФЕКТЫ ================= */
.hero{isolation:isolate}
.hero-bg{position:absolute;inset:0;z-index:-1;background:url('https://www.imbir.kz/wp-content/uploads/2015/02/m1-800x600.jpg') center/cover;opacity:.30;animation:kenburns 24s ease-in-out infinite alternate;filter:saturate(.85) brightness(.9)}
.hero-veil{position:absolute;inset:0;z-index:-1;background:radial-gradient(900px 500px at 30% 40%,transparent,rgba(8,32,24,.72) 85%)}
@keyframes kenburns{from{transform:scale(1)}to{transform:scale(1.16) translate(2%,-2%)}}
#petalsCv{position:absolute;inset:0;z-index:0;pointer-events:none}
.hero-in{position:relative;z-index:1}
.hero h1{font-size:clamp(38px,5.2vw,64px)}
.hero h1 em{font-style:italic;background:linear-gradient(90deg,#e8d19a,#fff6dd 30%,#caa35d 60%,#e8d19a);background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shineText 4s linear infinite}
@keyframes shineText{to{background-position:200% center}}
.btn{position:relative;overflow:hidden}
.btn::after{content:"";position:absolute;top:0;left:-90%;width:55%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-20deg)}
.btn:hover::after{animation:sweep .75s ease}
@keyframes sweep{from{left:-90%}to{left:135%}}
.rv{opacity:0;transform:translateY(32px) scale(.985);transition:opacity .75s ease,transform .75s cubic-bezier(.2,.7,.3,1)}
.rv.on{opacity:1;transform:none}
.view-anim{animation:viewIn .5s cubic-bezier(.2,.7,.3,1)}
@keyframes viewIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.marquee{overflow:hidden;background:var(--emerald);border-top:1px solid rgba(255,255,255,.09);padding:14px 0}
.mq-track{display:inline-flex;white-space:nowrap;animation:mq 32s linear infinite;color:var(--gold-2);font-size:12.5px;letter-spacing:3px;text-transform:uppercase;font-weight:700}
@keyframes mq{to{transform:translateX(-50%)}}
.sec-head .eyebrow::before,.sec-head .eyebrow::after{content:"✦";margin:0 12px;color:var(--gold);font-size:11px;vertical-align:1px}
.pcard .ph{height:200px;overflow:hidden}
.pcard .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .8s cubic-bezier(.2,.7,.3,1)}
.pcard:hover .ph img{transform:scale(1.1) rotate(.5deg)}

const esc=s=>s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ================= NAV / I18N ================= */
function go(v){
  view=v;
  ['home','catalog','builder','check','success'].forEach(x=>document.getElementById('view-'+x).classList.toggle('hidden',x!==v));
  document.querySelectorAll('[data-nav]').forEach(b=>b.classList.toggle('active',b.dataset.nav===v));
  document.getElementById('navlinks').classList.remove('open');
  if(v==='catalog')renderCatalog();
  if(v==='builder')renderBuilder();
  const ve=document.getElementById('view-'+v);
  ve.classList.remove('view-anim');void ve.offsetWidth;ve.classList.add('view-anim');
  initReveal();
  window.scrollTo({top:0,behavior:'smooth'});
}
function setLang(l){
  lang=l;
  document.querySelectorAll('#langSwitch button').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll('[data-i18n-html]').forEach(el=>el.innerHTML=t(el.dataset.i18nHtml));
  renderNominals();renderPopular();renderFaq();renderFilters();buildMarquee();
  if(view==='catalog')renderCatalog();
  if(view==='builder')renderBuilder();
  document.documentElement.lang=l==='kz'?'kk':l;
  initReveal();
}

/* ================= HOME ================= */

      ${n.hit?`<span class="tag">${t('nom_hit')}</span>`:''}
      <div class="amt">${fmt(n.v)}</div><div class="lbl">${t('nom_from')}</div>
    </div>`).join('')+`
    <div class="nom" onclick="pickAmount(0)" style="grid-column:1/-1;padding:18px">
      <div class="amt" style="font-size:19px">✨ ${t('nom_custom')}</div>
    </div>`;
}
function pickAmount(v){B.type='amount';if(v)B.amount=v;bStep=0;go('builder');}
function pickProgram(id,oi){B.type='program';B.programId=id;B.optIdx=oi||0;bStep=1;go('builder');}
const IMG={1:'2015/02/m1-800x600.jpg',2:'2018/08/m26-800x600.jpg',3:'2018/01/m18-800x600.jpg',4:'2018/01/m19@2x-800x600.jpg',5:'2018/01/m6-800x600.jpg',6:'2018/01/m7-800x600.jpg',7:'2015/02/m5-800x1200.jpg',8:'2018/04/m9-800x600.jpg',9:'2018/01/m10-800x600.jpg',10:'2018/01/m12-800x600.jpg',12:'2018/01/m3-800x1200.jpg',13:'2018/04/m8-800x600.jpg',15:'2015/02/m4-800x600.jpg',16:'2018/04/m22-800x600.jpg',17:'2015/02/m23-800x1200.jpg',25:'2018/01/m24-800x600.jpg',26:'2018/04/m25-800x600.jpg',27:'2018/04/m26-1-800x600.jpg'};
const imgUrl=p=>IMG[p.id]?'https://www.imbir.kz/wp-content/uploads/'+IMG[p.id]:null;
const fromPrice=v=>lang==='kz'?fmt(v)+' бастап':lang==='en'?'from '+fmt(v):'от '+fmt(v);
function cardHTML(p){
  const cn={massage:t('f_massage'),spa:t('f_spa'),set:t('f_set')}[p.cat];
  const img=imgUrl(p), mp=Math.min(...p.opts.map(o=>o.p));
  return `<div class="pcard">
    <div class="ph ${p.g}">${img?`<img src="${img}" alt="${p.n[lang]}" loading="lazy" onerror="this.remove()">`:`<span class="ph-orn">❀</span>`}<span class="cat">${cn}</span><span class="price-badge">${fromPrice(mp)}</span></div>
    <div class="body">
      <h3>${p.n[lang]}</h3><div class="desc">${p.d[lang]}</div>
      <div class="opts">${p.opts.map((o,i)=>`<div class="opt" data-p="${p.id}" data-i="${i}" onclick="selOpt(this)"><span>${optLabel(o)}</span><b>${fmt(o.p)}</b></div>`).join('')}</div>
      <button class="btn btn-green" onclick="buyCard(${p.id},this)">${t('buy')}</button>
    </div></div>`;
}
function selOpt(el){
  el.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}
function buyCard(id,btn){
  const card=btn.closest('.pcard'),sel=card.querySelector('.opt.sel');
  pickProgram(id,sel?+sel.dataset.i:0);
}
function renderPopular(){
  document.getElementById('popularGrid').innerHTML=PROGRAMS.filter(p=>p.pop).slice(0,6).map(cardHTML).join('');
}
function renderFaq(){
  document.getElementById('faqList').innerHTML=I18N[lang].faq.map(f=>
    `<details><summary>${f[0]}</summary><div class="fa-body">${f[1]}</div></details>`).join('');

/* ================= CATALOG ================= */
function renderFilters(){
  const fs=[['all','f_all'],['pop','f_pop'],['massage','f_massage'],['spa','f_spa'],['set','f_set']];
  document.getElementById('catFilters').innerHTML=fs.map(f=>
    `<button class="chip ${catFilter===f[0]?'active':''}" onclick="catFilter='${f[0]}';renderFilters();renderCatalog()">${t(f[1])}</button>`).join('');
  const s=document.getElementById('sortSel'),d=document.getElementById('durSel');
  const sv=s.value,dv=d.value;
  s.innerHTML=`<option value="def">${t('sort_def')}</option><option value="asc">${t('sort_asc')}</option><option value="desc">${t('sort_desc')}</option>`;
  d.innerHTML=`<option value="all">${t('dur_all')}</option><option value="60">${t('dur_60')}</option><option value="90">${t('dur_90')}</option><option value="120">${t('dur_120')}</option>`;
  if(sv)s.value=sv;if(dv)d.value=dv;
}
function renderCatalog(){
  let list=PROGRAMS.filter(p=>catFilter==='all'||(catFilter==='pop'?p.pop:p.cat===catFilter));
  const dur=document.getElementById('durSel').value;
  if(dur!=='all')list=list.filter(p=>p.opts.some(o=>{
    const m=o.m||180;
    return dur==='60'?m<=60:dur==='90'?m===90:m>=120;
  }));
  const sort=document.getElementById('sortSel').value;
  const minP=p=>Math.min(...p.opts.map(o=>o.p));
  if(sort==='asc')list=[...list].sort((a,b)=>minP(a)-minP(b));
  if(sort==='desc')list=[...list].sort((a,b)=>minP(b)-minP(a));
  document.getElementById('catalogGrid').innerHTML=list.map(cardHTML).join('');
}

/* ================= V2 · ЭФФЕКТЫ ================= */
const raf=typeof requestAnimationFrame!=='undefined'?(f=>requestAnimationFrame(f)):(f=>setTimeout(f,16));
const reducedMotion=()=>typeof matchMedia!=='undefined'&&matchMedia('(prefers-reduced-motion: reduce)').matches;

const io=typeof IntersectionObserver!=='undefined'?new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){e.target.classList.add('on');io.unobserve(e.target)}
}),{threshold:.12}):null;
function initReveal(){
  if(!io)return;
  document.querySelectorAll('.step,.nom,.pcard,.sec-head,.faq details,.check-box').forEach((el,i)=>{
    if(!el.classList.contains('rv')){el.classList.add('rv');el.style.transitionDelay=(i%6*70)+'ms';io.observe(el)}
  });
}

function buildMarquee(){
  const el=document.getElementById('mqTrack');if(!el)return;
  const items=['Imbir Thai Spa','Астана','Алматы','Караганда','Павлодар',t('cert_gift'),...PROGRAMS.filter(p=>p.pop).map(p=>p.n[lang])];
  const s=items.join('&nbsp;&nbsp;✦&nbsp;&nbsp;')+'&nbsp;&nbsp;✦&nbsp;&nbsp;';
  el.innerHTML=`<span>${s}</span><span>${s}</span>`;
}

function animCounters(){
  document.querySelectorAll('[data-count]').forEach(b=>{
    const target=+b.dataset.count,suf=b.dataset.suffix||'',t0=Date.now();
    (function step(){
      const k=Math.min(1,(Date.now()-t0)/1500);
      b.textContent=Math.round(target*(1-Math.pow(1-k,3)))+suf;
      if(k<1)raf(step);
    })();
  });
}

function addTilt(el){
  if(!el||!el.addEventListener)return;
  el.classList.add('tilt');
  el.addEventListener('mousemove',e=>{
    if(reducedMotion())return;
    const r=el.getBoundingClientRect();
    const x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
    el.style.transform=`perspective(900px) rotateY(${(x*10).toFixed(2)}deg) rotateX(${(-y*10).toFixed(2)}deg)`;
  });
  el.addEventListener('mouseleave',()=>el.style.transform='');
}

function petals(){
  if(reducedMotion())return;
  const cv=document.getElementById('petalsCv');if(!cv||typeof cv.getContext!=='function')return;
  const ctx=cv.getContext('2d');if(!ctx)return;
  const hero=document.getElementById('hero');
  const rs=()=>{cv.width=hero.offsetWidth||1200;cv.height=hero.offsetHeight||620};
  rs();if(window.addEventListener)window.addEventListener('resize',rs);
  const P=Array.from({length:26},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:2+Math.random()*3.5,s:.25+Math.random()*.75,ph:Math.random()*6.28,o:.2+Math.random()*.45}));
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{
      p.y+=p.s;p.ph+=.012;p.x+=Math.sin(p.ph)*.5;
      if(p.y>cv.height+12){p.y=-12;p.x=Math.random()*cv.width}
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.r,p.r*.55,p.ph,0,6.283);
      ctx.fillStyle=`rgba(230,207,154,${p.o})`;ctx.fill();
    });
    raf(loop);
  })();
}

function confetti(){
  if(reducedMotion())return;
  const cv=document.getElementById('confettiCv');if(!cv||typeof cv.getContext!=='function')return;
  const ctx=cv.getContext('2d');if(!ctx)return;
  cv.width=window.innerWidth||1200;cv.height=window.innerHeight||800;
  const C=['#c9a25c','#e6cf9a','#14523f','#ffffff','#8e3a6d'];
  const P=Array.from({length:150},()=>({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.6,w:5+Math.random()*6,h:8+Math.random()*8,c:C[Math.floor(Math.random()*C.length)],v:2.2+Math.random()*3.6,a:Math.random()*6.28,va:(Math.random()-.5)*.25,sw:Math.random()*2}));
  const t0=Date.now();
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    P.forEach(p=>{
      p.y+=p.v;p.a+=p.va;p.x+=Math.sin(p.a)*p.sw;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);
      ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    if(Date.now()-t0<2800)raf(loop);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}
